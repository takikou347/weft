name: Supabase keepalive

# Supabase無料プランは約1週間アクティビティが無いと一時停止されるため、
# 週2回、REST API 経由で軽いクエリを投げて停止を防ぐ(§8.2)。
# リポジトリの Secrets に SUPABASE_URL / SUPABASE_ANON_KEY を設定すること。

on:
  schedule:
    - cron: "23 6 * * 1,4" # 月・木 06:23 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase へ疎通クエリ
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_URL / SUPABASE_ANON_KEY が未設定のため何もしません"
            exit 0
          fi
          # RLSにより0件しか返らないが、DBへ実クエリが届くためアクティビティになる
          curl -sf \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/items?select=id&limit=1" > /dev/null
          echo "ping ok"
