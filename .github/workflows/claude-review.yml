name: Claude PR Review

# トリガーは pull_request: synchronize ではなく CI 完了(workflow_run)。
# push のたびにフルレビューすると、CI が落ちた push(どうせ修正される)まで
# レビューしてトークンを浪費するため、CI green になった時点の内容だけをレビューする。
# 同一コミットの重複レビューは、コメントに埋め込むマーカー([claude-review-sha])で
# 決定論的に skip する。
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: claude-review-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  review:
    # フォーク PR の除外(pwn request 対策): workflow_run は base リポジトリの権限と
    # secrets で走るため、head_repository の一致検査が必須(claude-autofix-ci.yml と同じガード)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check secrets / PR 特定 / レビュー済み判定
        id: gate
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets 未設定のためスキップ(docs/development/workflow.md 参照)"
            exit 0
          fi
          # workflow_run イベントには PR 番号が含まれないため head ブランチから引く
          PR_JSON=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,baseRefName,headRefOid --jq '.[0] // empty')
          if [ -z "$PR_JSON" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::オープン PR が見つからないためスキップ ($BRANCH)"
            exit 0
          fi
          PR=$(jq -r .number <<<"$PR_JSON")
          BASE=$(jq -r .baseRefName <<<"$PR_JSON")
          # CI 完了を待つ間に新しい push があった場合は skip(最新 push の CI 完了時にレビューする)
          if [ "$(jq -r .headRefOid <<<"$PR_JSON")" != "$HEAD_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::PR #$PR の head が $HEAD_SHA から進んでいるためスキップ"
            exit 0
          fi
          # 同一コミットをレビュー済みなら skip(再実行で CI が複数回 green になるため)
          if gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .body' \
            | grep -qF "[claude-review-sha] ${HEAD_SHA}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::コミット $HEAD_SHA はレビュー済みのためスキップ"
            exit 0
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        id: review
        if: steps.gate.outputs.skip != 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            PR #${{ steps.gate.outputs.pr }} をレビューしてください。
            リポジトリは checkout 済みで、base ブランチ origin/${{ steps.gate.outputs.base }} も
            fetch 済みです。変更差分は `git diff origin/${{ steps.gate.outputs.base }}...HEAD` で
            取得できます。ネットワークアクセスや gh コマンド(`gh pr view` 等)は承認されないため
            使わないこと — 許可されている `git diff` / `git log` / `git show` とリポジトリ内の
            ファイル読み取りだけで完結させること。
            .claude/agents/code-reviewer.md の観点と出力形式に従い、
            CLAUDE.md の不変条件(RLS・共有モデル)への違反を最優先で確認し、
            セキュリティ・型・テスト欠落を [must] / [nits] で指摘してください。
            問題がなければ「must 指摘なし」とだけ返してください。
            レビュー結果は PR にコメント投稿せず、最終応答のテキストとして返すこと
            (投稿は後続のワークフローステップが決定論的に行う)。
          claude_args: |
            --model sonnet
            --max-turns 40
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
      # レビュー結果の投稿はエージェント任せにしない: コメント投稿系ツールが拒否されて
      # 結果が PR に残らないケースがあるため、実行ログの最終テキストをこのステップが常に投稿する
      - name: レビュー結果を PR にコメント投稿
        if: steps.gate.outputs.skip != 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
          EXEC_FILE: ${{ steps.review.outputs.execution_file }}
          PR_NUMBER: ${{ steps.gate.outputs.pr }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          FILE="${EXEC_FILE:-$RUNNER_TEMP/claude-execution-output.json}"
          if [ ! -f "$FILE" ]; then
            echo "::warning::実行ログが見つからないためレビュー結果を投稿できません ($FILE)"
            exit 0
          fi
          BODY="$(jq -r '[.[] | select(.type == "result")][0].result // empty' "$FILE")"
          SUBTYPE="$(jq -r '[.[] | select(.type == "result")][0].subtype // empty' "$FILE")"
          if [ -z "$BODY" ]; then
            echo "::warning::レビュー本文が空のため投稿をスキップ (subtype: ${SUBTYPE:-不明})"
            exit 0
          fi
          if [ "$SUBTYPE" != "success" ]; then
            # 実行が異常終了したときの途中結果を、正常なレビューと誤読させない
            BODY="$(printf '> [!WARNING]\n> レビュー実行が正常終了していません (subtype: %s)。以下は途中結果の可能性があります。\n\n%s' "${SUBTYPE:-不明}" "$BODY")"
          fi
          # GitHub のコメント本文上限(65536 字)を超えると 422 で失敗するため切り詰める
          BODY="${BODY:0:60000}"
          # レビュー済みマーカーは gate ステップの「レビュー済み判定」が参照する。
          # 成功時のみ付与する — 失敗した実行に付けると同一コミットの再レビューが
          # 永久にスキップされてしまう(失敗時は CI の Re-run で再レビューできる)
          if [ "$SUBTYPE" = "success" ]; then
            BODY="$(printf '%s\n\n<sub>[claude-review-sha] %s</sub>' "$BODY" "$HEAD_SHA")"
          fi
          printf '## 自動レビュー (claude-review)\n\n%s\n' "$BODY" \
            | jq -Rs '{body: .}' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --input - >/dev/null
          echo "レビュー結果を PR #${PR_NUMBER} に投稿しました"
