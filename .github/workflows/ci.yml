name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:

jobs:
  checks:
    name: 型チェック・lint・ユニットテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  rls-e2e:
    name: マイグレーション検証・RLS分離テスト(E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase start が supabase/migrations/ を適用する = マイグレーション検証を兼ねる
      - name: ローカルSupabaseを起動
        run: supabase start

      - name: 接続情報を環境変数へ展開
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      - name: Playwright ブラウザを準備
        run: npx playwright install --with-deps chromium

      - name: RLS分離テスト(Playwright)
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
